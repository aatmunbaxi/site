baseURL = 'https://aatmunbaxi.netlify.app'
languageCode = 'en-us'
title = 'abaxi'
theme = 'archie'

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    
  [markup.goldmark]
    [markup.goldmark.renderer]
        unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$'], ['\begin{equation}', '\end{equation}'], ['\begin{equation*}','\end{equation*}']]
          inline = [['\(', '\)']]

[params]
customcss = [
"/css/modus_operandi_tinted.css",
"/css/syntax.css",
"/css/dark.css",
"/css/fonts.css",

"/css/common.css",
"/css/code.css",
"/css/simple-icons.css"
]
ShowWordCount = true
useCDN = true
katex = true
mode = "toggle"


[[params.social]]
title = "GitHub"
icon = "github"
url = "https://github.com/aatmunbaxi"

[[params.social]]
title = "LinkedIn"
icon = "linkedin"
url = "https://linkedin.com/in/aatmunbaxi"

[[params.social]]
title = "rss"
icon = "rss"
url = "https://aatmunbaxi.netlify.app/rss_indices/"

[taxonomies]
tag = "tags"
series = "series"
section = "section"

[outputs]
section = ['html','rss']
taxonomy = ['html','rss' ]
term = ['html','rss']
series = ['html','rss']




rssLimit = 20
