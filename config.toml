baseURL = 'https://aatmunbaxi.netlify.app'
languageCode = 'en-us'
title = 'abaxi'
theme = 'archie'
# sectionPagesMenu = 'main'

# codeFences = true
# guessSyntax= true
pygmentsstyle = "monokai"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

[params]
customcss = [
"/css/modus_operandi_tinted.css",
"/css/dark.css",
"/css/fonts.css",

"/css/common.css",
"/css/code.css",
"/css/simple-icons.css"
]
ShowWordCount = true
useCDN = true
katex = true
mode = "toggle"

[[params.social]]
title = "GitHub"
icon = "github"
url = "https://github.com/aatmunbaxi"

[[params.social]]
title = "rss"
icon = "rss"
url = "https://aatmunbaxi.netlify.app/rss_indices/"

[taxonomies]
tag = "tags"
series = "series"
section = "section"

[outputs]
section = ['html','rss']
taxonomy = ['html','rss' ]
term = ['html','rss']
series = ['html','rss']

[markup.highlight]
      noClasses = false
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
        unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        # [markup.goldmark.extensions.passthrough.delimiters]
        #   block = [['\[', '\]']]
        #   inline = [['\(', '\)']]


[markup.goldmark.extensions.passthrough.delimiters]
  block = [['\[', '\]'], ['$$', '$$'], ['\begin{equation}', '\end{equation}'], ['\begin{equation*}','\end{equation*}']]
  inline = [['\(', '\)']]
rssLimit = 20
